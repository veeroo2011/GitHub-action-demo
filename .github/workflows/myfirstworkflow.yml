name: My First Workflow

on: 
  push:
    branches:
      - main
    #  - develop
    #  - 'feature-*' # run workflow on any branch that starts with feature-
  pull_request:
    branches:
      - main # trigger workflow on PRs targeting the main branch
  workflow_dispatch: # Allow to run pipeline manually from github UI 

env:  # defining global variable which can be used in any job or step
  USER: Abhimanyu
  APP_NAME: HOTEL MANAGEMENT SYSTEM
  PORT: 8080

jobs:
  Checkout:
    name: Checkout Repository
    runs-on: ubuntu-latest
    steps:
      - name: List files before checkout
        run: pwd && ls -latr
      - name: Checkout code
        uses: actions/checkout@v4
      - name: List files after checkout
        run: pwd && ls -latr

  Artifacts:
    name: Upload Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Create files
        run: |
          echo "First artifact $PWD" > artifact.txt
          echo "Extra artifact file" > artifact4.txt
          mkdir -p artifacts
          echo "Second artifact $(date)" > artifacts/artifact2.txt
          echo "Third artifact $(hostname)" > artifacts/artifact3.txt

      - name: Upload single file
        uses: actions/upload-artifact@v4
        with:
          name: single_file
          path: artifact.txt
      - name: Upload multiple file
        uses: actions/upload-artifact@v4
        with:
          name: multiple_file
          path: artifacts/

  Download-Artifacts:
    name: Download Artifacts
    runs-on: ubuntu-latest
    needs: Artifacts
    steps:
      - name: Check files before download
        run: pwd && ls -ltr
      - name: Download multiple-path artifact
        uses: actions/download-artifact@v4
        with:
          name: single_file
      - name: Check files after download
        run: pwd && ls -ltr

  Download-Artifacts-Custom-location:
    name: Download Artifacts to Custom Path
    runs-on: ubuntu-latest
    needs: Artifacts
    steps:
      - name: Create custom directories
        run: |
          mkdir -p single_file
          mkdir -p multiple-dir
      - name: Download single_file artifact
        uses: actions/download-artifact@v4
        with:
          name: multiple_file
          path: multiple-dir
      - name: Accessing environment variable
        run: |
          echo "Value of USER is $USER"
          echo "Value of APP_NAME is $APP_NAME"
          echo "Value of PORT is $PORT"
      - name: Accessing context variable
        run: |
          echo "Workflow name is ${{ github.workflow }}"
          echo "Event name is ${{ github.event_name }}"
          echo "Actor name is ${{ github.actor }}"
          echo "[INFO] New changes are added by ${{ github.actor }} in ${{ github.ref_name }} branch."
          echo "[INFO] Current Step is running on ${{ runner.os }}."
          echo "[INFO] Current JOB ID is ${{ job.check_run_id }}."
      - name: Accessing repository secrets
        run: |
          echo "Value of App password is ${{secrets.APP_PASS}}"
  Deployment-stg:
    name: Deployment to staging environment
    runs-on: ubuntu-latest
    steps:
      - name: Accessing environment variable
        run: |
          echo "Value of USER is ${{vars.USER}}"
          echo " Value of host is ${{vars.HOSTNAME}}"
      - name: Accessing environment secrets variable
        run: |
          echo "Value of USER is ${{secrets.PASSWORD}}"
    environment:
      name: staging
    if: github.ref == 'refs/heads/feature-*'

  Deployment-prod:
    name: Deployment to production environment
    runs-on: ubuntu-latest
    steps:
      - name: Accessing environment variable
        run: |
          echo "Value of USER is ${{vars.USER}}"
          echo " Value of host is ${{vars.HOSTNAME}}"
      - name: Accessing environment secrets variable
        run: |
          echo "Value of USER is ${{secrets.PASSWORD}}"
    environment:
      name: PRODUCTION
    if: github.ref == 'refs/heads/develop'

