name: my first workflow
# name of the workflow
on: 
  push:
    branches:
      - main
  #schedule:
  #  - cron: '*/5 * * * *' # this workflow will run every 5 minutes
  workflow_dispatch: # this will allow us to run the workflow manually from the github actions tab

jobs:
  Build:
    name: job1
    runs-on: ubuntu-latest
    steps:
      - name: check os release name of github hosted runner
        run: cat /etc/os-release
      - name: check hostname of the runner
        run: hostname -i
  Test:
    name: testing
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: start testing of the application
        run: echo "testing application"
  code-scan:
    name: code quality check
    runs-on: ubuntu-latest
    needs:
      - Test # this job will run after the Test job is completed successfully
      - Build # this job will run after the Build job is completed successfully
    steps:
      - name: starting snyk code scan
        run: | # it is used to run multiple commands in a single step
         echo "code quality check completed"
         sleep 20
  Deploy:
    name: deploying application to kubernetes with dependency
    runs-on: ubuntu-latest
    needs: 
      - code-scan
    steps:
      - name: starting deployment with multiple command
        run: |
          echo "deployment completed"
          echo "second deployment completed"
          echo $HOSTNAME
          hostname -i
          ps
  checkout:
    name: checkout code from github repository
    runs-on: ubuntu-latest
    steps:
      - name: listing files in the current directory
        run: pwd & ls -latr
      - name: checking out the code from github repository
        uses: actions/checkout@v7.0.0
      - name: listing files after checking out the code
        run: pwd & ls -latr
  artifacts-1:
    name: uploading single artifact to github
    runs-on: ubuntu-latest
    steps:
      - name: creating multiple files to upload as artifacts
        run: |
         echo "this is our first artifact $PWD" > artifact.txt
         echo "this is our first artifact ls" > artifact4.txt
         mkdir -p artifacts
         echo "this is our second artifact $date" > artifacts/artifact2.txt
         echo "this is our third artifact $hostname" > artifacts/artifact3.txt

      - name: uploading the single artifact to github
        uses: actions/upload-artifact@v7.0.0
        with:
          name: my-artifact # while uploading the artifact we can give a name to the artifact
          path: ./artifact.txt # path of the artifact to be uploaded
      - name: uploading multiple files from directory to github
        uses: actions/upload-artifact@v7.0.0
        with:
          name: multiple-artifacts
          path: artifacts/
      - name: uploading files from multiple paths to github
        uses: actions/upload-artifact@v7.0.0
        with:
          name: multiple-path
          path: |
            ./artifact.txt
            artifacts/
      - name: uploading files from multiple paths with exclusion to github
        uses: actions/upload-artifact@v7.0.0
        with:
          name: multiple-path-with-exclusion
          path: |
            ./artifact.txt
            artifacts/
            !**./artifact4.txt # this will exclude the artifact4.txt file from being uploaded to github

    

