name: My First Workflow

on: 
  push:
    branches:
      - main
  workflow_dispatch: # allows manual runs from the Actions tab
  # schedule:
  #   - cron: '*/5 * * * *' # run every 5 minutes

jobs:
  Build:
    name: Build Job
    runs-on: ubuntu-latest
    steps:
      - name: Check OS release
        run: cat /etc/os-release
      - name: Check hostname
        run: hostname -i

  Test:
    name: Test Job
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Run tests
        run: echo "Testing application"

  Code-Scan:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: [Build, Test]
    steps:
      - name: Run code scan
        run: |
          echo "Code quality check completed"
          sleep 20

  Deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: Code-Scan
    steps:
      - name: Deployment steps
        run: |
          echo "Deployment completed"
          echo "Second deployment completed"
          echo $HOSTNAME
          hostname -i
          ps

  Checkout:
    name: Checkout Repository
    runs-on: ubuntu-latest
    steps:
      - name: List files before checkout
        run: pwd && ls -latr
      - name: Checkout code
        uses: actions/checkout@v4
      - name: List files after checkout
        run: pwd && ls -latr

  Artifacts:
    name: Upload Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Create files
        run: |
          echo "First artifact $PWD" > artifact.txt
          echo "Extra artifact file" > artifact4.txt
          mkdir -p artifacts
          echo "Second artifact $(date)" > artifacts/artifact2.txt
          echo "Third artifact $(hostname)" > artifacts/artifact3.txt

      - name: Upload single file
        uses: actions/upload-artifact@v4
        with:
          name: single_file
          path: artifact.txt

      - name: Upload directory
        uses: actions/upload-artifact@v4
        with:
          name: multiple-artifacts
          path: artifacts/

      - name: Upload multiple paths
        uses: actions/upload-artifact@v4
        with:
          name: multiple-path
          path: |
            artifact.txt
            artifacts/

      - name: Upload with exclusion
        uses: actions/upload-artifact@v4
        with:
          name: multiple-path-with-exclusion
          path: |
            artifact.txt
            artifacts/
            !artifact4.txt

  Download-Artifacts:
    name: Download Artifacts
    runs-on: ubuntu-latest
    needs: Artifacts
    steps:
      - name: Check files before download
        run: pwd && ls -ltr
      - name: Download multiple-path artifact
        uses: actions/download-artifact@v4
        with:
          name: multiple-path
      - name: Check files after download
        run: pwd && ls -ltr

  Download-Artifacts-Custom:
    name: Download Artifacts to Custom Path
    runs-on: ubuntu-latest
    needs: Artifacts
    steps:
      - name: Create custom directories
        run: |
          mkdir -p single_file
          mkdir -p multiple-dir
      - name: Download single_file artifact
        uses: actions/download-artifact@v4
        with:
          name: single_file
          path: single_file
      - name: Download multiple-path artifact
        uses: actions/download-artifact@v4
        with:
          name: multiple-path
          path: multiple-dir
      - name: List downloaded files
        run: |
          ls -ltr single_file/
          ls -ltr multiple-dir/
  Deployment-stg:
    name: Deployment to staging environment
    runs-on: ubuntu-latest
    steps:
      - name: Accessing environment variable
        run: |
          echo "Value of USER is ${{vars.USER}}"
          echo " Value of host is ${{vars.HOSTNAME}}"
      - name: Accessing environment secrets variable
        run: |
          echo "Value of USER is ${{secrets.PASSWORD}}"
    environment:
      name: STAGING
  Deployment-prod:
    name: Deployment to production environment
    runs-on: ubuntu-latest
    steps:
      - name: Accessing environment variable
        run: |
          echo "Value of USER is ${{vars.USER}}"
          echo " Value of host is ${{vars.HOSTNAME}}"
      - name: Accessing environment secrets variable
        run: |
          echo "Value of USER is ${{secrets.PASSWORD}}"
    environment:
      name: PRODUCTION
