name: My First Workflow

on: 
  push:
    branches:
      - main
  workflow_dispatch: # allows manual runs from the Actions tab
  pull_request:
    branches:
      - main

jobs:
  Unit-Tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0
      - name: Setup Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Unit Tests
        run: |
          mkdir -p reports
          pytest --junitxml=reports/Unit-test-results.xml --cov=. --cov-report=xml --cov-report=term-missing -v
      - name: Upload Code coverage Report
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Unit-test-report
          path: reports/

  codeql:
    name: CodeQL security Scan # use to scan the repo for secuirity vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write # Required to upload the results of the codeql scan analysis results
    strategy: # Required to run the codeql analysis
      matrix:
        language: ['python']
    steps:
      - name: checkout repository
        uses: actions/checkout@v5.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "security"
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [Unit-Tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Download Coverage reports
        uses: actions/download-artifact@v5.0.0
        with:
          name: Unit-test-report
          path: reports/
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [codeql,sonarqube]
    if: success() # only run this job if the previous jobs are successful
    outputs:
      image-tags: ${{ steps.vars.outputs.IMAGE_TAGS }}
    steps:
      - name: checkout Code
        uses: actions/checkout@v5.0.0
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0
      - name: Generate image tag
        id: vars
        run: |
          IMAGE_TAGS="${{ github.run_id }}-${GITHUB_SHA::7}"
          echo "IMAGE_TAGS=$IMAGE_TAGS" >> $GITHUB_OUTPUT
      - name: Build docker Image (no push)
        uses: docker/build-push-action@v5.0.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: thinknyx_app:${{ steps.vars.outputs.IMAGE_TAGS }}
      - name: save docker images as tar
        run: |
          docker save thinknyx_app:${{ steps.vars.outputs.IMAGE_TAGS }} -o thinknyx_app.tar
      - name: upload docker image as artifacts
        uses: actions/upload-artifact@v5.0.0
        with:
          name: thinknyx_app_image
          path: thinknyx_app.tar
  Docker-Image-push:
    name: Push Docker Image to DockerHub
    runs-on: ubuntu-latest
    needs: [build-image]
    if: success () # only run this job if the previous jobs are successful
    steps:
      - name: Download docker image artifact
        uses: actions/download-artifact@v5.0.0
        with:
          name: thinknyx_app_image
          path: .
      - name: Load docker image from tar
        run: |
          docker load -i thinknyx_app.tar
      - name: Dockerhub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push docker image to dockerhub
        run: |
          IMAGE_TAG = "${{ needs.build-image.outputs.image-tags }}"
          docker tag thinknyx_app:$IMAGE_TAG ${{ secrets.DOCKER_USERNAME }}/thinknyx_app:$IMAGE_TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/thinknyx_app:$IMAGE_TAG

    